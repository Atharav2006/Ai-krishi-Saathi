version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=krishi_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d krishi_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Future Services Placeholder
  # backend:
  #   build: ../backend
  #   ports:
  #     - "8000:8000"
  #   ...

  # ml_inference:
  #   build: ../ml_pipeline
  #   ...

volumes:
  postgres_data:
