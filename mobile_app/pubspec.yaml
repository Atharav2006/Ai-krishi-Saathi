name: ai_krishi_saathi
description: AI-powered agriculture decision support system for offline-first rural environments.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management & Dependency Injection
  flutter_bloc: ^8.1.3
  get_it: ^7.6.0
  equatable: ^2.0.5
  
  # Networking
  dio: ^5.4.0
  connectivity_plus: ^5.0.2
  dio_smart_retry: ^6.0.0
  
  # Local Storage & Offline-First DB
  sqflite: ^2.3.0
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # JSON Serialization
  json_annotation: ^4.8.1

  # Camera & Device Media
  camera: ^0.10.5+5
  image_picker: ^1.0.4

  # Machine Learning (On-device)
  tflite_flutter: ^0.12.1
  image: ^4.1.4
  
  # UI / UX Utilities
  cached_network_image: ^3.3.0
  flutter_spinkit: ^5.2.0

  # Date Formatting & Utilities
  intl: ^0.19.0
  uuid: ^4.2.1
  flutter_sound: ^9.28.0
  just_audio: ^0.10.5
  http: ^1.6.0
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1
  build_runner: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/i18n/
    - assets/models/
